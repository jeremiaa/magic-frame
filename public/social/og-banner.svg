<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient: deep navy with subtle blue-purple wash -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="60%" stop-color="#0f1530" />
      <stop offset="100%" stop-color="#1a1240" />
    </linearGradient>

    <!-- Brand gradient (matches logo) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Soft glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45" />
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <!-- Glass-card gradient (semi-transparent) -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03" />
    </linearGradient>

    <!-- Right-side fade so cards don't compete with text -->
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0e1a" stop-opacity="0" />
      <stop offset="20%" stop-color="#0a0e1a" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0" />
    </linearGradient>

    <!-- Mini-logo as a symbol for re-use -->
    <symbol id="brandMark" viewBox="0 0 120 160">
      <rect x="5" y="5" width="110" height="150" rx="22" fill="url(#brandGrad)" />
      <rect x="14" y="14" width="92" height="132" rx="14" fill="#0f172a" />
      <path d="M14 110 L38 90 L60 105 L80 85 L92 95 V146 H14 Z" fill="url(#brandGrad)" fill-opacity="0.4" />
      <rect x="25" y="28" width="45" height="16" rx="5" fill="white" />
      <rect x="75" y="28" width="20" height="16" rx="5" fill="white" fill-opacity="0.3" />
      <rect x="25" y="50" width="60" height="6" rx="3" fill="white" fill-opacity="0.2" />
      <path d="M100 20C100 20 98 17 95 17C98 17 100 14 100 14C100 14 102 17 105 17C102 17 100 20 100 20Z" fill="#fbbf24" stroke="#0f172a" stroke-width="1.5" />
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)" />

  <!-- Decorative soft glow behind logo -->
  <circle cx="200" cy="320" r="280" fill="url(#logoGlow)" />

  <!-- Subtle grid pattern for tech-feel -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="320" y1="0" x2="320" y2="640" />
    <line x1="640" y1="0" x2="640" y2="640" />
    <line x1="960" y1="0" x2="960" y2="640" />
  </g>

  <!-- Decorative glass cards on the right (further right, smaller, less opacity) -->
  <!-- Total card cluster: x=970 to x=1240, well clear of any text -->
  <g transform="translate(970, 130)" opacity="0.85">
    <!-- Card 1: clock-like -->
    <rect x="0" y="0" width="130" height="80" rx="12" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />
    <rect x="15" y="22" width="80" height="16" rx="3" fill="#ffffff" fill-opacity="0.42" />
    <rect x="15" y="46" width="55" height="7" rx="2" fill="#ffffff" fill-opacity="0.22" />
    <rect x="15" y="58" width="40" height="7" rx="2" fill="#ffffff" fill-opacity="0.18" />

    <!-- Card 2: weather -->
    <rect x="140" y="0" width="130" height="80" rx="12" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />
    <circle cx="170" cy="30" r="12" fill="#fbbf24" fill-opacity="0.85" />
    <rect x="190" y="22" width="55" height="10" rx="3" fill="#ffffff" fill-opacity="0.4" />
    <rect x="190" y="36" width="45" height="7" rx="2" fill="#ffffff" fill-opacity="0.22" />
    <rect x="155" y="54" width="100" height="6" rx="2" fill="#ffffff" fill-opacity="0.15" />
    <rect x="155" y="64" width="70" height="6" rx="2" fill="#ffffff" fill-opacity="0.15" />

    <!-- Card 3: button row (full width) -->
    <rect x="0" y="100" width="270" height="60" rx="12" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />
    <rect x="15" y="115" width="55" height="30" rx="8" fill="url(#brandGrad)" fill-opacity="0.65" />
    <rect x="80" y="115" width="55" height="30" rx="8" fill="#ffffff" fill-opacity="0.15" />
    <rect x="145" y="115" width="55" height="30" rx="8" fill="#ffffff" fill-opacity="0.15" />
    <rect x="210" y="115" width="45" height="30" rx="8" fill="#ffffff" fill-opacity="0.15" />

    <!-- Card 4: list/todos -->
    <rect x="0" y="180" width="270" height="140" rx="12" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1" />
    <rect x="15" y="200" width="90" height="10" rx="3" fill="#ffffff" fill-opacity="0.42" />
    <g fill="#ffffff" fill-opacity="0.22">
      <circle cx="25" cy="230" r="5" />
      <rect x="40" y="226" width="200" height="8" rx="2" />
      <circle cx="25" cy="252" r="5" />
      <rect x="40" y="248" width="170" height="8" rx="2" />
      <circle cx="25" cy="274" r="5" />
      <rect x="40" y="270" width="190" height="8" rx="2" />
      <circle cx="25" cy="296" r="5" />
      <rect x="40" y="292" width="140" height="8" rx="2" />
    </g>
  </g>

  <!-- Soft fade from background to mask cards' left edge — extra text-card separation -->
  <rect x="800" y="0" width="220" height="640" fill="url(#rightFade)" />

  <!-- Brand mark (logo) — slightly smaller, positioned tightly -->
  <use href="#brandMark" x="80" y="200" width="150" height="200" />

  <!-- Wordmark + tagline — left-aligned, never crosses x=900 -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" fill="#ffffff">
    <!-- Big wordmark, 78pt (was 92) so it fits within 250-880 with room -->
    <text x="260" y="290" font-size="78" font-weight="800" letter-spacing="0.5">Magic Frame</text>

    <!-- Tagline, two lines, max ~520px wide -->
    <text x="260" y="338" font-size="24" font-weight="500" fill="#cbd5e1" letter-spacing="0">Local glassmorphism dashboard</text>
    <text x="260" y="370" font-size="24" font-weight="500" fill="#cbd5e1" letter-spacing="0">for tablets, monitors &amp; picture frames</text>

    <!-- Feature pills row, single line, capped at 560px -->
    <g font-size="16" font-weight="600" fill="#94a3b8">
      <text x="260" y="430">Drag &amp; drop  ·  Live sync  ·  Home Assistant  ·  Self-hosted</text>
    </g>
  </g>

  <!-- Bottom-right metadata badge -->
  <g transform="translate(1100, 590)">
    <rect x="-150" y="-26" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1" />
    <text x="-75" y="-4" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">jeremiaa/magic-frame</text>
  </g>
</svg>
